# Agent configuration — all key=value pairs are exported as env vars
# See: claude --help for available models and options
ANTHROPIC_MODEL="claude-opus-4-6"
CLAUDE_CODE_EFFORT_LEVEL=max
CLAUDE_CODE_ENABLE_THINKING=1


# see more at:  https://code.claude.com/docs/en/env-vars
# ANTHROPIC_MODEL                           # Set the default model (e.g. claude-opus-4-6, claude-sonnet-4-6)
# ANTHROPIC_API_KEY                         # API key (if using API instead of subscription)                  
# CLAUDE_CODE_ENABLE_THINKING               # Enable extended thinking                                        
# CLAUDE_CODE_EFFORT_LEVEL                  # low, medium, high, max (Opus only), or auto                     
# CLAUDE_CODE_SUBAGENT_MODEL                # Model for subagents                                             
# CLAUDE_CODE_MAX_OUTPUT_TOKENS             # Max output tokens per response                                  
# MAX_THINKING_TOKENS                       # Override thinking token budget                                  
# CLAUDE_CODE_DISABLE_AUTO_MEMORY           # Disable auto memory                                             
# CLAUDE_CODE_DISABLE_FAST_MODE             # Disable fast mode                                               
# CLAUDE_CODE_SIMPLE                        # Minimal mode (no MCP, hooks, CLAUDE.md)                         
# BASH_DEFAULT_TIMEOUT_MS                   # Default bash command timeout                                    
# DISABLE_PROMPT_CACHING                    # Disable prompt caching


# Already handled within Dockerfile:
# CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC  # Disable telemetry, auto-updates, error reporting                
# DISABLE_AUTOUPDATER                       # Disable auto-updates


