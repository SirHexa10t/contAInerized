# Agent configuration — all key=value pairs are exported as env vars
# See: claude --help for available models and options
ANTHROPIC_MODEL=claude-sonnet-4-6
CLAUDE_CODE_EFFORT_LEVEL=medium

ENABLE_TOOL_SEARCH=true

# explicitly keep memory on, so it can learn which references land well with you and which fall flat over time.
CLAUDE_CODE_DISABLE_AUTO_MEMORY=0

CLAUDE_CODE_MAX_OUTPUT_TOKENS=18000

