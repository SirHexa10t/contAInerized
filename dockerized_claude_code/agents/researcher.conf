# Agent configuration — all key=value pairs are exported as env vars
# See: claude --help for available models and options
ANTHROPIC_MODEL="claude-opus-4-7"
CLAUDE_CODE_EFFORT_LEVEL=max
CLAUDE_CODE_ENABLE_THINKING=1
ENABLE_TOOL_SEARCH=true
MAX_MCP_OUTPUT_TOKENS=60000

# raise this if you have issues:
CLAUDE_CODE_MAX_OUTPUT_TOKENS=40000
CLAUDE_CODE_FILE_READ_MAX_OUTPUT_TOKENS=100000

# set this lower (say 50–60) if the agent will be doing multi-step research across many tool calls within one session
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=60
